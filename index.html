<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionale Serramenti</title>
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SerramentiPro">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 16px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col">

    <header class="bg-slate-900 text-white shadow-md sticky top-0 z-50 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center space-x-2">
            <span class="text-xl font-bold tracking-tight text-blue-400">🚪 Serramenti<span class="text-white font-medium">Pro</span></span>
        </div>
        <div class="text-xs bg-slate-800 text-slate-400 px-2 py-1 rounded-md border border-slate-700">Dev: Sebak</div>
    </header>

    <main class="flex-1 max-w-md w-full mx-auto p-4 space-y-4 mb-20">
        
        <div class="flex space-x-2">
            <div class="relative flex-1">
                <input type="text" id="searchClient" oninput="filterClients()" placeholder="Cerca cliente o note..." 
                       class="w-full pl-10 pr-4 py-2 bg-white border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                <span class="absolute left-3 top-2.5 text-slate-400 text-sm">🔍</span>
            </div>
            <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg font-medium shadow flex items-center text-sm transition-colors">
                <span class="mr-1">➕</span> Nuovo
            </button>
        </div>

        <div id="loading" class="text-center py-8 text-slate-500 text-sm">
            ⏳ Caricamento clienti da Supabase...
        </div>

        <div class="space-y-3 hidden" id="clientList"></div>
    </main>

    <div id="clientModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-xl space-y-4 my-8">
            <h3 class="text-lg font-bold text-slate-900">Aggiungi Nuovo Cliente</h3>
            <div class="space-y-3 text-sm max-h-[60vh] overflow-y-auto pr-1">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Tipo Cliente</label>
                    <select id="newTipo" class="w-full p-2 border rounded-lg bg-slate-50">
                        <option value="PRIVATO">Privato</option>
                        <option value="AZIENDA">Azienda</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Nome / Ragione Sociale *</label>
                    <input type="text" id="newDenominazione" class="w-full p-2 border rounded-lg bg-slate-50" placeholder="Es: Mario Rossi">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Telefono</label>
                    <input type="tel" id="newTelefono" class="w-full p-2 border rounded-lg bg-slate-50" placeholder="Es: 333123456">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Email</label>
                    <input type="email" id="newEmail" class="w-full p-2 border rounded-lg bg-slate-50" placeholder="Es: info@azienda.it">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Indirizzo</label>
                    <input type="text" id="newIndirizzo" class="w-full p-2 border rounded-lg bg-slate-50" placeholder="Es: Via Roma 10, Cittadella">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Note Generali (Appunti personali)</label>
                    <textarea id="newNote" rows="3" class="w-full p-2 border rounded-lg bg-slate-50" placeholder="Dettagli utili per ricordare il cliente..."></textarea>
                </div>
            </div>
            <div class="flex space-x-3 pt-2">
                <button onclick="closeModal()" class="flex-1 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-lg font-medium transition-colors">Annulla</button>
                <button onclick="saveCliente()" class="flex-1 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-colors">Salva</button>
            </div>
        </div>
    </div>

    <div id="detailModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-xl space-y-4 my-8">
            <div class="flex justify-between items-center border-b pb-2">
                <h3 class="text-lg font-bold text-slate-900">Scheda Cliente</h3>
                <button onclick="closeDetailModal()" class="text-slate-400 hover:text-slate-600 text-xl">✕</button>
            </div>
            <input type="hidden" id="editId">
            <div class="space-y-3 text-sm max-h-[60vh] overflow-y-auto pr-1">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Tipo Cliente</label>
                    <select id="editTipo" class="w-full p-2 border rounded-lg bg-slate-50">
                        <option value="PRIVATO">Privato</option>
                        <option value="AZIENDA">Azienda</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Nome / Ragione Sociale *</label>
                    <input type="text" id="editDenominazione" class="w-full p-2 border rounded-lg bg-slate-50">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Telefono</label>
                    <input type="tel" id="editTelefono" class="w-full p-2 border rounded-lg bg-slate-50">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Email</label>
                    <input type="email" id="editEmail" class="w-full p-2 border rounded-lg bg-slate-50">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Indirizzo</label>
                    <input type="text" id="editIndirizzo" class="w-full p-2 border rounded-lg bg-slate-50">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Note Generali (Appunti personali)</label>
                    <textarea id="editNote" rows="3" class="w-full p-2 border rounded-lg bg-slate-50"></textarea>
                </div>
            </div>
            <div class="flex space-x-3 pt-2">
                <button onclick="closeDetailModal()" class="flex-1 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-lg font-medium transition-colors">Chiudi</button>
                <button onclick="updateCliente()" class="flex-1 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg font-medium transition-colors">Aggiorna Dati</button>
            </div>
        </div>
    </div>

    <nav class="bg-white border-t border-slate-200 fixed bottom-0 left-0 right-0 z-50 shadow-lg safe-bottom">
        <div class="max-w-md mx-auto flex justify-around items-center py-2 text-center">
            <a href="#" class="flex flex-col items-center text-blue-600 font-semibold text-xs flex-1">
                <span class="text-xl">👥</span><span>Clienti</span>
            </a>
            <a href="#" class="flex flex-col items-center text-slate-400 text-xs flex-1">
                <span class="text-xl">📄</span><span>Preventivi</span>
            </a>
            <a href="#" class="flex flex-col items-center text-slate-400 text-xs flex-1">
                <span class="text-xl">📦</span><span>Ordini</span>
            </a>
            <a href="#" class="flex flex-col items-center text-slate-400 text-xs flex-1">
                <span class="text-xl">📊</span><span>Fatture</span>
            </a>
        </div>
    </nav>

    <script>
        // CONFIGURAZIONE SUPABASE
        const SUPABASE_URL = "https://jskrttromnqvupuzghap.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impza3J0dHJvbW5xdnVwdXpnaGFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0NjczODgsImV4cCI6MjA5OTA0MzM4OH0.08IaXn5PMVdOGITPjOTmudDbhuXWSo5YCwRnTKxAOQQ";

        const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let allClients = [];

        // Scarica i clienti da Supabase
        async function fetchClienti() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('clientList').classList.add('hidden');

            const { data, error } = await db
                .from('clienti')
                .select('*')
                .order('denominazione', { ascending: true });

            if (error) {
                console.error(error);
                alert("Errore nel caricamento dei dati.");
                return;
            }

            allClients = data;
            renderClients(allClients);
        }

        // Disegna le card dei clienti a schermo
        function renderClients(list) {
            const container = document.getElementById('clientList');
            container.innerHTML = "";
            document.getElementById('loading').classList.add('hidden');
            container.classList.remove('hidden');

            if (list.length === 0) {
                container.innerHTML = `<div class="text-center py-8 text-slate-400 text-sm">Nessun cliente trovato.</div>`;
                return;
            }

            list.forEach(cliente => {
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-xl shadow-sm border border-slate-200 hover:border-blue-300 transition-all cursor-pointer space-y-2 relative";
                
                // Pulizia numero telefono per WhatsApp (rimuove spazi o caratteri strani)
                const cleanPhone = cliente.telefono ? cliente.telefono.replace(/\s+/g, '') : '';
                // Se non ha il prefisso internazionale, aggiungiamo il 39 dell'Italia per WhatsApp
                const waPhone = cleanPhone.startsWith('+') || cleanPhone.startsWith('00') ? cleanPhone : '39' + cleanPhone;

                card.innerHTML = `
                    <div onclick="openDetailModal('${cliente.id}')" class="pr-24">
                        <span class="text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded bg-slate-100 text-slate-600">${cliente.tipo_cliente}</span>
                        <h3 class="text-base font-bold text-slate-900 mt-1">${cliente.denominazione}</h3>
                        <p class="text-xs text-slate-500 mt-1">📍 ${cliente.indirizzo_fatturazione || 'Nessun indirizzo'}</p>
                    </div>
                    
                    <div class="absolute top-4 right-4 flex flex-col space-y-1.5 z-10">
                        ${cliente.telefono ? `<a href="tel:${cliente.telefono}" class="p-2 bg-blue-50 hover:bg-blue-100 text-blue-600 rounded-full text-center text-xs shadow-sm transition-colors" title="Chiama">📞</a>` : ''}
                        ${cliente.email ? `<a href="mailto:${cliente.email}" class="p-2 bg-emerald-50 hover:bg-emerald-100 text-emerald-600 rounded-full text-center text-xs shadow-sm transition-colors" title="Invia Email">✉️</a>` : ''}
                        ${cliente.telefono ? `<a href="https://wa.me/${waPhone}" target="_blank" class="p-2 bg-green-50 hover:bg-green-100 text-green-600 rounded-full text-center text-xs shadow-sm transition-colors" title="WhatsApp">💬</a>` : ''}
                    </div>

                    ${cliente.note_generali ? `
                        <div onclick="openDetailModal('${cliente.id}')" class="bg-slate-50 p-2 rounded-lg border border-slate-100 text-xs text-slate-600 italic mt-2">
                            📌 <strong>Nota:</strong> ${cliente.note_generali}
                        </div>
                    ` : ''}
                `;
                container.appendChild(card);
            });
        }

        function filterClients() {
            const term = document.getElementById('searchClient').value.toLowerCase();
            const filtered = allClients.filter(c => 
                c.denominazione.toLowerCase().includes(term) || 
                (c.note_generali && c.note_generali.toLowerCase().includes(term))
            );
            renderClients(filtered);
        }

        // Modale NUOVO CLIENTE
        function openModal() { document.getElementById('clientModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('clientModal').classList.add('hidden'); }

        // Modale DETTAGLIO / MODIFICA CLIENTE
        function openDetailModal(id) {
            const cliente = allClients.find(c => c.id === id);
            if (!cliente) return;

            document.getElementById('editId').value = cliente.id;
            document.getElementById('editTipo').value = cliente.tipo_cliente;
            document.getElementById('editDenominazione').value = cliente.denominazione;
            document.getElementById('editTelefono').value = cliente.telefono || '';
            document.getElementById('editEmail').value = cliente.email || '';
            document.getElementById('editIndirizzo').value = cliente.indirizzo_fatturazione || '';
            document.getElementById('editNote').value = cliente.note_generali || '';

            document.getElementById('detailModal').classList.remove('hidden');
        }
        function closeDetailModal() { document.getElementById('detailModal').classList.add('hidden'); }

        // Salva Nuovo Cliente
        async function saveCliente() {
            const tipo = document.getElementById('newTipo').value;
            const denominazione = document.getElementById('newDenominazione').value.trim();
            const telefono = document.getElementById('newTelefono').value.trim();
            const email = document.getElementById('newEmail').value.trim();
            const indirizzo = document.getElementById('newIndirizzo').value.trim();
            const note = document.getElementById('newNote').value.trim();

            if (!denominazione) { alert("Il campo Nome è obbligatorio!"); return; }

            const { error } = await db.from('clienti').insert([{ 
                tipo_cliente: tipo, denominazione, telefono, email, indirizzo_fatturazione: indirizzo, note_generali: note 
            }]);

            if (error) { alert("Errore nel salvataggio."); } else {
                closeModal();
                document.getElementById('newDenominazione').value = "";
                document.getElementById('newTelefono').value = "";
                document.getElementById('newEmail').value = "";
                document.getElementById('newIndirizzo').value = "";
                document.getElementById('newNote').value = "";
                fetchClienti();
            }
        }

        // Aggiorna / Modifica Cliente Esistente
        async function updateCliente() {
            const id = document.getElementById('editId').value;
            const tipo = document.getElementById('editTipo').value;
            const denominazione = document.getElementById('editDenominazione').value.trim();
            const telefono = document.getElementById('editTelefono').value.trim();
            const email = document.getElementById('editEmail').value.trim();
            const indirizzo = document.getElementById('editIndirizzo').value.trim();
            const note = document.getElementById('editNote').value.trim();

            if (!denominazione) { alert("Il campo Nome è obbligatorio!"); return; }

            const { error } = await db.from('clienti').update({ 
                tipo_cliente: tipo, denominazione, telefono, email, indirizzo_fatturazione: indirizzo, note_generali: note 
            }).eq('id', id);

            if (error) {
                console.error(error);
                alert("Errore nell'aggiornamento dei dati.");
            } else {
                closeDetailModal();
                fetchClienti(); // Ricarica la lista aggiornata
            }
        }

        window.onload = () => {
            fetchClienti();
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(err => console.error(err));
            }
        };
    </script>
</body>
</html>
