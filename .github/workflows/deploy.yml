name: Deploy Edge Function to Supabase

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Function and Set Secrets
        run: |
          # 1. Colleghiamo il progetto usando le virgolette per proteggere i caratteri speciali della password
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}" --password "${{ secrets.SUPABASE_DB_PASSWORD }}"
          
          # 2. Facciamo il deploy della cartella locale "google-drive-upload" ma sovrascriviamo la funzione online "index-ts"
          supabase functions deploy google-drive-upload --name index-ts --no-verify-jwt
          
          # 3. Inviamo la chiave di Google Drive a Supabase
          supabase secrets set GOOGLE_SERVICE_ACCOUNT_JSON='${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
